<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | South Bay Sites</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: white;
            color: #1f2937;
            padding: 60px 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }

        .check {
            font-size: 70px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #0f172a;
        }

        p {
            font-size: 20px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 20px;
        }

        .home-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 16px 34px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .home-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="card">

    <div class="check">✅</div>

    <h1>Thank You!</h1>

    <p>
        We've successfully received your request.
    </p>

    <p>
        A member of <strong>South Bay Sites</strong> will review your information and get back to you within <strong>24 hours</strong>.
    </p>

    <a class="home-btn" href="/">
        Return to Home
    </a>

</div>

</body>
</html>
